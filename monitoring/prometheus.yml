global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: lab

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
        - localhost:9090

  - job_name: node
    static_configs:
      - targets:
        - 10.0.20.10:9100
        - 10.0.20.5:9100
        - 10.0.20.6:9100

  - job_name: snmp
    snmp:
      targets:
        - 10.0.10.1
      metrics_path: /snmp
      params:
        module:
          - if_mib
      scrape_interval: 60s

  - job_name: blackbox
    metrics_path: /probe
    params:
      module:
        - http_2xx
        - icmp
    static_configs:
      - targets:
        - https://10.0.20.5
        - https://10.0.20.11
        - https://10.0.20.15
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: wazuh
    static_configs:
      - targets:
        - 10.0.20.5:55000
