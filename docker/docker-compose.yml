services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7
    hostname: wazuh-manager
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_data:/var/ossec/data
    environment:
      - WAZUH_MANAGER_IP=10.0.20.5
    restart: unless-stopped

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7
    hostname: wazuh-indexer
    ports:
      - "9200:9200"
    volumes:
      - indexer_data:/var/lib/elasticsearch
    environment:
      - cluster.initial_master_nodes=wazuh-indexer
      - discovery.seed_hosts=wazuh-indexer
    restart: unless-stopped

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7
    hostname: wazuh-dashboard
    ports:
      - "443:5601"
    environment:
      - OPENSEARCH_HOSTS=https://wazuh-indexer:9200
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=changeme
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    restart: unless-stopped

  adguard:
    image: adguard/adguardhome:latest
    ports:
      - "53:53/udp"
      - "80:80"
      - "853:853/tcp"
    volumes:
      - adguard_data:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf
    restart: unless-stopped

volumes:
  wazuh_data:
  indexer_data:
  prometheus_data:
  grafana_data:
  adguard_data:
  adguard_conf:
